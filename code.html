<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .velvet-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
        }

        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .animate-drift {
            animation: drift 6s ease-in-out infinite;
        }

        .wax-seal-transition {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .wax-seal-transition:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0px 15px 40px rgba(88, 11, 20, 0.3);
        }
    </style>

<body class="bg-primary-container text-on-primary-container overflow-hidden min-h-screen flex flex-col items-center justify-center relative">
<!-- Subtle Texture Overlay -->
<div class="absolute inset-0 velvet-texture pointer-events-none"></div>
<!-- Atmospheric Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center text-center max-w-[600px] px-margin-mobile">
<!-- Decorative Flourish Top -->
<div class="mb-8 opacity-60">
<svg fill="none" height="40" viewbox="0 0 80 40" width="80" xmlns="http://www.w3.org/2000/svg">
<path class="text-tertiary-fixed-dim" d="M40 5C45 5 55 15 75 15M40 5C35 5 25 15 5 15M40 5V35" stroke="currentColor" stroke-linecap="round" stroke-width="1"></path>
</svg>
</div>
<!-- Headline -->
<h1 class="font-headline-md text-headline-md md:font-display-lg md:text-display-lg text-tertiary-fixed-dim mb-12 italic tracking-wide animate-drift">
            Hallo Bub...
        </h1>
<!-- The Interactive Envelope / Action Area -->
<div class="group relative cursor-pointer" id="envelopeTrigger">
<!-- Envelope Outer Shadow -->
<div class="absolute inset-0 bg-primary rounded-xl blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
<!-- Envelope Body (Visualized as a high-end card/packet) -->
<div class="relative bg-surface-container-low p-8 md:p-12 rounded-xl shadow-[0px_10px_30px_rgba(0,0,0,0.3)] border border-tertiary/20 flex flex-col items-center gap-8 wax-seal-transition">
<!-- Envelope Flap Detail -->
<div class="absolute top-0 left-0 w-full h-2 bg-tertiary-fixed-dim/30 rounded-t-xl"></div>
<div class="w-full h-48 md:h-64 relative overflow-hidden rounded-lg bg-primary-container/10 border border-tertiary/10">
<div class="w-full h-full bg-cover bg-center opacity-90 transition-transform duration-700 group-hover:scale-110" data-alt="A macro photograph of a luxurious, thick cream-colored envelope resting on deep red velvet fabric. The lighting is soft and cinematic, coming from the side to emphasize the paper's texture and the rich pile of the velvet. The mood is intimate, mysterious, and romantic, with deep shadows and golden highlights." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCqQH1e5bkUA3KvfJUF2baFNd6WFnpuNQc6pC4J32UmfHhBbsiLkZS5Gv1yCsDSHg_gUdJB3VNcD7SFq-VUCzAGYeeLzZMztYPP56IjIpK3oLLPfIGxa7uP3dAJvJ0xt2KUEFRWUtE_lcnXHjrH2_gv0XQ_YcWC7CIfFP8OWtNV8yeVUDuIe41_r18SLSyX2wRduSMyrudLq-nq6pgAysN0ojwWprGWMhunrFJey2c6_QR9mUgbXkLgw08GhFCXOYNDqUAm4aQV-Q')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/60 to-transparent"></div>
</div>
<!-- The "Wax Seal" Action Button -->
<button class="relative flex flex-col items-center group/btn" onclick="handleOpenMessage()">
<div class="w-20 h-20 md:w-24 md:h-24 bg-[#93000a] rounded-full shadow-[inset_0px_2px_4px_rgba(255,255,255,0.2),0px_4px_10px_rgba(0,0,0,0.5)] flex items-center justify-center relative overflow-hidden active:scale-90 transition-transform duration-150">
<!-- Embossed Logo/Icon -->
<span class="material-symbols-outlined text-tertiary-fixed-dim text-4xl md:text-5xl opacity-80" data-icon="mail" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mail</span>
<!-- Gloss effect -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent"></div>
</div>
<span class="mt-6 font-label-caps text-label-caps text-tertiary-fixed-dim tracking-[0.2em] group-hover/btn:text-tertiary-fixed transition-colors">

                    </span>
</button>
</div>

<!-- Background Elements (Floating Dust/Particles) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden" id="particle-container"></div>
<script>
        // Micro-interaction: Particle effect
        const particleContainer = document.getElementById('particle-container');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-tertiary-fixed-dim opacity-10 rounded-full blur-[1px]';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            
            const duration = Math.random() * 15 + 10;
            const delay = Math.random() * 5;
            
            particle.animate([
                { transform: 'translate(0, 0)', opacity: 0 },
                { transform: `translate(${Math.random() * 100 - 50}px, ${-Math.random() * 100 - 50}px)`, opacity: 0.15 },
                { transform: `translate(${Math.random() * 200 - 100}px, ${-Math.random() * 200 - 100}px)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                iterations: Infinity,
                easing: 'ease-in-out'
            });
            
            particleContainer.appendChild(particle);
        }

        function handleOpenMessage() {
    const trigger = document.getElementById('envelopeTrigger');

    trigger.style.transition = 'all 0.8s cubic-bezier(0.7, 0, 0.3, 1)';
    trigger.style.transform = 'scale(0.95) translateY(20px)';
    trigger.style.opacity = '0';

    setTimeout(() => {
        window.location.href = "code1.html";
    }, 800);
}

        // Parallax Effect on Mouse Move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            const trigger = document.getElementById('envelopeTrigger');
            if(trigger) {
                trigger.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
            }
        });
    </script>
